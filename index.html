    async function replaceSupabaseRows(table, rows, toRow) {
      try {
        const { data: existing, error: readError } = await supabaseClient
          .from(table)
          .select("id");

        if (readError) throw readError;

        const nextRows = rows.map(toRow);
        const nextIds = new Set(nextRows.map(row => String(row.id)));
        const removedIds = (existing || [])
          .map(row => String(row.id))
          .filter(id => !nextIds.has(id));

        if (removedIds.length) {
          const { error: deleteError } = await supabaseClient
            .from(table)
            .delete()
            .in("id", removedIds);
          if (deleteError) throw deleteError;
        }

        if (nextRows.length) {
          const { error: upsertError } = await supabaseClient
            .from(table)
            .upsert(nextRows, { onConflict: "id" });
          if (upsertError) throw upsertError;
        }
      } catch (error) {
        console.error(`Supabase sync failed for ${table}:`, error);
        alert(`ไม่สามารถบันทึกข้อมูล ${table} ไปยัง Supabase ได้: ${error.message}`);
      }
    }

    function fromDataRows(rows) {

    async function fetchERPData(role) {
      const isAdmin = role === "Admin";

      // Guest only requests tables permitted by the Supabase RLS policies.
      const tableNames = isAdmin
        ? [
            "orders",
            "customers",
            "products",
            "documents",
            "payments",
            "production",
            "shipments",
            "audit_logs",
            "app_settings"
          ]
        : [
            "orders",
            "customers",
            "products",
            "production",
            "shipments"
          ];

      const results = await Promise.all(
        tableNames.map(async table => {
          const result = await supabaseClient.from(table).select("*");
          return [table, result];
        })
      );

      const failed = results.find(([, result]) => result.error);
      if (failed) throw failed[1].error;

      const resultByTable = Object.fromEntries(
        results.map(([table, result]) => [table, result.data || []])
      );

      const settingsRow = resultByTable.app_settings?.[0];

      return {
        orders: fromDataRows(resultByTable.orders),
        customers: fromDataRows(resultByTable.customers),
        products: fromDataRows(resultByTable.products),
        documents: isAdmin ? fromDataRows(resultByTable.documents) : [],
        payments: isAdmin ? fromDataRows(resultByTable.payments) : [],
        production: fromDataRows(resultByTable.production),
        shipments: fromDataRows(resultByTable.shipments),
        auditLogs: isAdmin ? fromDataRows(resultByTable.audit_logs) : [],
        settings: isAdmin
          ? (settingsRow?.data || {
              companyName: settingsRow?.company_name || DEFAULT_SETTINGS.companyName,
              taxId: settingsRow?.tax_id || DEFAULT_SETTINGS.taxId,
              prefix: settingsRow?.order_prefix || DEFAULT_SETTINGS.prefix
            })
          : DEFAULT_SETTINGS
      };
    }

      <img src={EVERGEN_LOGO_SRC} alt="EVERGEN Technologies" className={`block object-contain object-center ${className}`} />
    );

    const WORKFLOW_STAGES = [
      "รับออเดอร์", "ออกใบเสนอราคา", "รอลูกค้ายืนยัน", "รอชำระเงิน", "ผลิตหนัง",

    ];

    // --- PROCEDURAL SEED GENERATOR (Guarantees required minimums in a clean, compact code footprint) ---
    const INITIAL_CUSTOMERS = [];

    const INITIAL_PRODUCTS = [];

    const INITIAL_ORDERS = [];

    const INITIAL_DOCUMENTS = [];

    const INITIAL_PAYMENTS = [];

    const INITIAL_PRODUCTION = [];

    const INITIAL_SHIPMENTS = [];

    // Login users are system accounts, not sample business data.
    const INITIAL_USERS = [
      { id: "USR-01", name: "Admin", role: "Admin", email: "admin@evergen.com", status: "Active" },
      { id: "USR-02", name: "Guest", role: "Guest", email: "guest@evergen.com", status: "Active" }
    ];

    const INITIAL_AUDIT_LOGS = [];


    // --- CONTEXT & SECURITY UTILS ---
    function useERPPermissions(user) {
      const isViewer = user?.role === "Guest";
      return {
        isViewer,
        guard: (cb) => {
          if (isViewer) {
            alert("สิทธิ์ระดับ Guest สามารถเข้าชมและตรวจสอบรายงานสารสนเทศระบบได้เท่านั้น ไม่สามารถกระทำการเพิ่มหรือปรับแก้ไขข้อมูลได้");
            return;
          }
          cb();
        }
      };
    }


    function Modal({ title, children, onClose, footer, wide = false }) {
      return <div className="fixed inset-0 bg-slate-950/55 z-50 flex items-center justify-center p-4" onMouseDown={onClose}>
        <div className={`bg-white rounded-2xl shadow-2xl border border-slate-200 w-full ${wide ? 'max-w-3xl' : 'max-w-lg'} max-h-[90vh] flex flex-col`} onMouseDown={e => e.stopPropagation()}>
          <div className="px-5 py-4 border-b flex items-center justify-between"><h3 className="font-extrabold text-brand">{title}</h3><button onClick={onClose} className="w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-500">✕</button></div>
          <div className="p-5 overflow-y-auto">{children}</div>
          {footer && <div className="px-5 py-4 bg-slate-50 border-t flex justify-end gap-2 rounded-b-2xl">{footer}</div>}
        </div>
      </div>;
    }

    const Field = ({ label, ...props }) => <label className="block"><span className="block text-[10px] font-bold text-slate-500 mb-1.5">{label}</span><input {...props} className={`w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:border-gold ${props.className || ''}`} /></label>;
    const SelectField = ({ label, children, ...props }) => <label className="block"><span className="block text-[10px] font-bold text-slate-500 mb-1.5">{label}</span><select {...props} className={`w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:border-gold ${props.className || ''}`}>{children}</select></label>;
    const StatusBadge = ({ children, tone = 'blue' }) => { const tones={blue:'bg-blue-50 text-blue-700 border-blue-200',green:'bg-emerald-50 text-emerald-700 border-emerald-200',red:'bg-rose-50 text-rose-700 border-rose-200',gold:'bg-amber-50 text-amber-800 border-amber-200',gray:'bg-slate-50 text-slate-600 border-slate-200'}; return <span className={`inline-flex px-2 py-0.5 rounded-full border text-[9px] font-bold ${tones[tone]}`}>{children}</span>; };

    // --- MAIN SPA ORCHESTRATOR ---
    function App() {
      const [user, setUser] = useState(null);
      const [currentRoute, setCurrentRoute] = useState("login");
      const [selectedOrderId, setSelectedOrderId] = useState(null);
      const [routeHistory, setRouteHistory] = useState([]);
      const [authLoading, setAuthLoading] = useState(true);
      const [dataLoading, setDataLoading] = useState(false);

      const [orders, setOrdersState] = useState(INITIAL_ORDERS);
      const [customers, setCustomersState] = useState(INITIAL_CUSTOMERS);
      const [products, setProductsState] = useState(INITIAL_PRODUCTS);
      const [documents, setDocumentsState] = useState(INITIAL_DOCUMENTS);
      const [payments, setPaymentsState] = useState(INITIAL_PAYMENTS);
      const [production, setProductionState] = useState(INITIAL_PRODUCTION);
      const [shipments, setShipmentsState] = useState(INITIAL_SHIPMENTS);
      const [users, setUsers] = useState(INITIAL_USERS);
      const [auditLogs, setAuditLogsState] = useState(INITIAL_AUDIT_LOGS);
      const [settings, setSettingsState] = useState({
        companyName: "Evergen Technologies Co., Ltd.",
        taxId: "0105562089410",
        prefix: "EVG-202502-"
      });

      const setOrders = updater => setOrdersState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("orders", next, toOrderRow));
        return next;
      });

      const setCustomers = updater => setCustomersState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("customers", next, toCustomerRow));
        return next;
      });

      const setProducts = updater => setProductsState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("products", next, toProductRow));
        return next;
      });

      const setDocuments = updater => setDocumentsState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("documents", next, toDocumentRow));
        return next;
      });

      const setPayments = updater => setPaymentsState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("payments", next, toPaymentRow));
        return next;
      });

      const setProduction = updater => setProductionState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("production", next, toProductionRow));
        return next;
      });

      const setShipments = updater => setShipmentsState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("shipments", next, toShipmentRow));
        return next;
      });

      const setAuditLogs = updater => setAuditLogsState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(() => replaceSupabaseRows("audit_logs", next, toAuditRow));
        return next;
      });

      const setSettings = updater => setSettingsState(previous => {
        const next = resolveNextState(previous, updater);
        queueMicrotask(async () => {
          try {
            const { data: existing, error: readError } = await supabaseClient
              .from("app_settings")
              .select("id")
              .limit(1)
              .maybeSingle();

            if (readError) throw readError;

            const row = {
              id: existing?.id || 1,
              company_name: next.companyName,
              tax_id: next.taxId,
              order_prefix: next.prefix,
              updated_at: new Date().toISOString(),
              data: next
            };

            const { error } = await supabaseClient
              .from("app_settings")
              .upsert(row, { onConflict: "id" });

            if (error) throw error;
          } catch (error) {
            console.error("Supabase settings sync failed:", error);
            alert(`ไม่สามารถบันทึกการตั้งค่าไปยัง Supabase ได้: ${error.message}`);
          }
        });
        return next;
      });

      const loadCurrentUserAndData = async session => {
        if (!session?.user) {
          setUser(null);
          setCurrentRoute("login");
          setAuthLoading(false);
          return;
        }

        setDataLoading(true);
        try {
          const { data: profile, error: profileError } = await supabaseClient
            .from("profiles")
            .select("role, display_name")
            .eq("id", session.user.id)
            .single();

          if (profileError) throw profileError;

          const role = profile.role === "admin" ? "Admin" : "Guest";
          const username = role === "Admin" ? "admin" : "guest";
          const activeUser = {
            username,
            role,
            name: profile.display_name || role,
            avatar: role === "Admin" ? "A" : "G"
          };

          const erpData = await fetchERPData(role);

          setUser(activeUser);
          setOrdersState(erpData.orders);
          setCustomersState(erpData.customers);
          setProductsState(erpData.products);
          setDocumentsState(erpData.documents);
          setPaymentsState(erpData.payments);
          setProductionState(erpData.production);
          setShipmentsState(erpData.shipments);
          setAuditLogsState(erpData.auditLogs);
          setSettingsState(erpData.settings);
          setCurrentRoute("dashboard");
        } catch (error) {
          console.error("Supabase load failed:", error);
          await supabaseClient.auth.signOut();
          setUser(null);
          setCurrentRoute("login");
          alert(`ไม่สามารถโหลดข้อมูลระบบจาก Supabase ได้: ${error.message}`);
        } finally {
          setAuthLoading(false);
          setDataLoading(false);
        }
      };

      useEffect(() => {
        let active = true;

        supabaseClient.auth.getSession().then(({ data, error }) => {
          if (!active) return;
          if (error) {
            console.error("Session check failed:", error);
            setAuthLoading(false);
            return;
          }
          loadCurrentUserAndData(data.session);
        });

        const { data: listener } = supabaseClient.auth.onAuthStateChange((event, session) => {
          if (!active) return;
          if (event === "SIGNED_OUT") {
            setUser(null);
            setCurrentRoute("login");
            setRouteHistory([]);
          }
        });

        return () => {
          active = false;
          listener.subscription.unsubscribe();
        };
      }, []);

      const logAuditAction = (action, detail, entity = "") => {
        const allowedEntities = ["customer", "product", "document", "production"];
        const allowedActions = ["add", "edit", "remove"];
        if (!allowedEntities.includes(entity) || !allowedActions.includes(action)) return;
        const entityNames = { customer: "ลูกค้า", product: "สินค้า", document: "เอกสาร", production: "การผลิต" };
        const actionNames = { add: "เพิ่ม", edit: "แก้ไข", remove: "ลบ" };
        const now = new Date();
        const ts = now.toLocaleString("th-TH");
        setAuditLogs(previous => [{
          id: `LOG-${Date.now()}`,
          timestamp: ts,
          user: user?.name || "System",
          action: `${actionNames[action]}${entityNames[entity]}`,
          entity,
          operation: action,
          detail
        }, ...previous]);
      };

      const loginAction = async (username, password) => {
        const normalizedUsername = username.trim().toLowerCase();
        const email = AUTH_EMAILS[normalizedUsername];

        if (!email) {
          alert("ชื่อผู้ใช้งานต้องเป็น admin หรือ guest");
          return;
        }

        setAuthLoading(true);
        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email,
            password
          });

          if (error) throw error;
          await loadCurrentUserAndData(data.session);
        } catch (error) {
          console.error("Login failed:", error);
          alert("ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง");
          setAuthLoading(false);
        }
      };

      // Back navigation is only available on deeper pages, such as creating
      // or viewing an individual order. Switching between main sidebar pages
      // (for example Settings → Shipping) does not create back history.
      const DEEP_ROUTES = ["orders_new", "order_detail"];

      const navigate = (route, id) => {
        if (user?.role === "Guest" && !GUEST_ALLOWED_ROUTES.has(route)) {
          alert("บัญชี Guest ไม่มีสิทธิ์เข้าถึงหน้านี้");
          setCurrentRoute("dashboard");
          setRouteHistory([]);
          setSelectedOrderId(null);
          return;
        }

        if (route === currentRoute && !id) return;

        const isGoingDeeper = DEEP_ROUTES.includes(route);

        if (isGoingDeeper) {
          setRouteHistory([{ route: currentRoute, selectedOrderId }]);
        } else {
          setRouteHistory([]);
        }

        if (route === "order_detail" && id) {
          setSelectedOrderId(id);
        } else if (route !== "order_detail") {
          setSelectedOrderId(null);
        }

        setCurrentRoute(route);
      };

      const goBack = () => {
        if (!DEEP_ROUTES.includes(currentRoute)) return;

        const previous = routeHistory[routeHistory.length - 1];
        setRouteHistory([]);
        setSelectedOrderId(previous?.selectedOrderId || null);
        setCurrentRoute(previous?.route || "orders");
      };

      const logoutAction = async () => {
        const { error } = await supabaseClient.auth.signOut();
        if (error) {
          console.error("Logout failed:", error);
          alert(`ออกจากระบบไม่สำเร็จ: ${error.message}`);
          return;
        }
        setUser(null);
        setCurrentRoute("login");
        setRouteHistory([]);
      };

      if (authLoading || dataLoading) {
        return (
          <div className="h-full flex items-center justify-center bg-[#E7ECF2]">
            <div className="bg-white border rounded-2xl shadow-xl px-8 py-6 text-center">
              <div className="text-brand font-black text-lg">EVERGEN ERP</div>
              <div className="text-slate-500 text-xs mt-2">กำลังเชื่อมต่อ Supabase และโหลดข้อมูล...</div>
            </div>
          </div>
        );
      }

      return (
        <React.Fragment>
          {currentRoute === "login" ? (
            <LoginPage onLogin={loginAction} />
          ) : (
            <AppShell user={user} currentRoute={currentRoute} onNavigate={navigate} onBack={goBack} canGoBack={DEEP_ROUTES.includes(currentRoute) && routeHistory.length > 0} selectedOrderId={selectedOrderId} onLogout={logoutAction}>
              <MainRouteHandler 
                route={currentRoute} user={user} orders={orders} setOrders={setOrders}
                customers={customers} setCustomers={setCustomers} products={products} setProducts={setProducts}
                documents={documents} setDocuments={setDocuments} payments={payments} setPayments={setPayments}
                production={production} setProduction={setProduction} shipments={shipments} setShipments={setShipments}
                auditLogs={auditLogs} setAuditLogs={setAuditLogs} users={users} setUsers={setUsers}
                settings={settings} setSettings={setSettings} logAuditAction={logAuditAction}
                selectedOrderId={selectedOrderId} onNavigate={navigate} onBack={goBack}
              />
            </AppShell>
          )}
        </React.Fragment>
      );
    }

    function MainRouteHandler(props) {
      if (props.user?.role === "Guest" && !GUEST_ALLOWED_ROUTES.has(props.route)) {
        return <DashboardPage {...props} />;
      }

      switch(props.route) {
        case "dashboard": return <DashboardPage {...props} />;
        case "orders": return <OrdersPage {...props} />;
        case "orders_new": return <CreateOrderPage {...props} />;
        case "order_detail": return <OrderDetailPage {...props} />;
        case "customers": return <CustomersPage {...props} />;
        case "products": return <ProductsPage {...props} />;
        case "documents": return <DocumentsPage {...props} />;
        case "reports": return <ReportsPage {...props} />;
        case "payments": return <PaymentsPage {...props} />;
        case "production": return <ProductionPage {...props} />;
        case "shipping": return <ShippingPage {...props} />;
        case "settings": return <SettingsPage {...props} />;
        case "users": return <UsersPage {...props} />;
        case "audit_log": return <AuditLogPage {...props} />;
        default: return <DashboardPage {...props} />;
      }
    }


    // --- APP SHELL WRAPPER ---
    function AppShell({ children, user, currentRoute, onNavigate, onBack, canGoBack, selectedOrderId, onLogout }) {
      const [collapsed, setCollapsed] = useState(false);
      const navItems = [
        { id: "dashboard", label: "แดชบอร์ด", icon: "▦" }, { id: "orders", label: "ออเดอร์ทั้งหมด", icon: "▤" }, { id: "orders_new", label: "สร้างออเดอร์ใหม่", icon: "+" },
        { id: "customers", label: "ลูกค้า", icon: "♙" }, { id: "products", label: "สินค้า / วัสดุ", icon: "◇" }, { id: "documents", label: "เอกสาร", icon: "▧" },
        { id: "reports", label: "รายงาน", icon: "⌁" }, { id: "payments", label: "การชำระเงิน", icon: "฿" }, { id: "production", label: "การผลิต", icon: "⚙" },
        { id: "shipping", label: "การจัดส่ง", icon: "⇢" }, { id: "settings", label: "ตั้งค่า", icon: "⚒" }, { id: "users", label: "ผู้ใช้งาน", icon: "♟" }, { id: "audit_log", label: "ประวัติการแก้ไข", icon: "↻" }
      ];
      const visibleNavItems = user?.role === "Guest"
        ? navItems.filter(item => [
            "dashboard",
            "orders",
            "customers",
            "products",
            "production",
            "shipping"
          ].includes(item.id))
        : navItems;

      const labels = Object.fromEntries(navItems.map(x => [x.id, x.label]));
      const currentLabel = currentRoute === "order_detail" ? selectedOrderId || "รายละเอียดออเดอร์" : labels[currentRoute] || currentRoute;

      return (
        <div className="h-screen flex app-canvas overflow-hidden text-[#172033] font-sarabun text-[13px]">
          <aside className={`bg-sidebar text-slate-300 transition-all duration-300 flex flex-col justify-between border-r border-[#0F284D]/30 relative ${collapsed ? 'w-16' : 'w-[200px]'}`}>
            <div>
              <div className={`border-b border-brand/50 flex items-center justify-center overflow-hidden transition-all duration-300 ${collapsed ? 'h-16 px-2' : 'h-24 px-4'}`}>
                <EvergenLogo className={collapsed ? "w-12 h-12" : "w-full max-w-[158px] h-[76px]"} />
              </div>
              <nav className="flex-1 overflow-y-auto py-3 px-2 space-y-0.5 max-h-[70vh]">
                {visibleNavItems.map((item) => (
                  <button key={item.id} onClick={() => onNavigate(item.id)} title={collapsed ? item.label : ""} className={`w-full flex items-center gap-3 py-2 px-3 rounded-lg text-xs font-semibold transition-all ${currentRoute === item.id ? 'bg-gold text-white shadow-md' : 'hover:bg-slate-800 text-slate-300'}`}>
                    <span className="w-4 text-center">{item.icon}</span>{!collapsed && <span className="truncate">{item.label}</span>}
                  </button>
                ))}
              </nav>
            </div>
            <div className="p-3 border-t border-brand/50 bg-slate-950/40">
              <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-full bg-gold/20 text-gold font-bold text-xs flex items-center justify-center flex-shrink-0">{user?.avatar}</div>{!collapsed && <div className="min-w-0 flex-1"><p className="text-xs font-bold text-white truncate leading-none">{user?.name}</p><span className="text-[9px] text-slate-400 mt-1 block truncate leading-none">{user?.role}</span></div>}</div>
              {!collapsed && <button onClick={onLogout} className="w-full mt-3 bg-rose-950/30 hover:bg-rose-900/40 text-rose-300 border border-rose-900/40 py-1.5 rounded-lg text-[10px] font-bold">ออกจากระบบ</button>}
            </div>
            <button onClick={() => setCollapsed(!collapsed)} className="absolute top-24 -right-3 w-6 h-6 rounded-full bg-gold text-white flex items-center justify-center shadow-lg transition-all z-10">{collapsed ? "▶" : "◀"}</button>
          </aside>
          <div className="flex-1 flex flex-col min-w-0">
            <header className="bg-white border-b border-slate-200 h-16 px-6 flex items-center justify-between flex-shrink-0 shadow-sm z-40">
              <div className="flex items-center gap-3 min-w-0">
                <button onClick={onBack} disabled={!canGoBack} className={`h-8 px-3 rounded-lg border font-bold text-[11px] transition ${canGoBack ? 'bg-white text-brand border-slate-200 hover:border-gold hover:text-gold' : 'bg-slate-50 text-slate-300 border-slate-100 cursor-not-allowed'}`}>← ย้อนกลับ</button>
                <div className="flex items-center gap-1.5 text-[11px] text-slate-400 font-semibold select-none min-w-0">
                  <button onClick={() => onNavigate('dashboard')} className="hover:text-gold">แดชบอร์ด</button><span>/</span>
                  {currentRoute === 'order_detail' && <><button onClick={() => onNavigate('orders')} className="hover:text-gold">ออเดอร์ทั้งหมด</button><span>/</span></>}
                  <span className="text-slate-700 font-bold truncate">{currentLabel}</span>
                </div>
              </div>
              <div className="flex items-center gap-4"><div className="text-[11px] font-bold text-slate-500 bg-slate-100 py-1.5 px-3 rounded-md">สิทธิ์: {user?.role}</div></div>
            </header>
            <main className="flex-1 overflow-y-auto p-6 relative app-canvas">
              {user?.role === "Guest" && (
                <div className="mb-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-[11px] font-bold text-amber-800">
                  โหมด Guest: ดูข้อมูลได้เท่านั้น ไม่สามารถเพิ่ม แก้ไข หรือลบข้อมูลได้
                </div>
              )}
              {children}
            </main>
          </div>
        </div>
      );
    }


    // --- PAGE 1: SPLIT SCREEN LOGIN PAGE ---
    function LoginPage({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');

      return (
        <div className="min-h-screen flex bg-white font-sarabun">
          <div className="hidden lg:flex lg:w-1/2 bg-white items-center justify-center p-12 relative overflow-hidden border-r-4 border-gold">
            <div className="z-10 w-full flex flex-col items-center justify-center">
              <EvergenLogo className="w-[520px] xl:w-[610px] max-w-[88%] h-auto" />
            </div>
            <div className="absolute bottom-12 left-12 z-10 text-[10px] text-slate-400">© 2024 Evergen Technologies Co., Ltd.</div>
          </div>
          <div className="w-full lg:w-1/2 flex items-center justify-center p-8 bg-sidebar">
            <div className="w-full max-w-sm space-y-6 bg-white p-8 rounded-xl shadow-md border border-slate-100">
              <div>
                <h3 className="text-xl font-bold text-brand">ลงชื่อเข้าใช้งานระบบ ERP</h3>
                <p className="text-xs text-secondaryText mt-1">ใช้บัญชี Admin หรือ Guest เพื่อเข้าสู่ระบบ</p>
              </div>
              <form onSubmit={(e) => { e.preventDefault(); onLogin(username, password); }} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1.5">ชื่อผู้ใช้</label>
                  <input type="text" className="w-full py-2.5 px-3 border rounded-lg text-xs" value={username} onChange={(e) => setUsername(e.target.value)} required />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1.5">รหัสผ่าน</label>
                  <input type="password" className="w-full py-2.5 px-3 border rounded-lg text-xs" value={password} onChange={(e) => setPassword(e.target.value)} required />
                </div>
                <button type="submit" className="w-full bg-brand hover:bg-[#071932] text-white py-2.5 rounded-lg text-xs font-bold transition-all mt-4">ลงชื่อเข้าใช้งาน</button>
              </form>
            </div>
          </div>
        </div>
      );
    }


    // --- PAGE 2: DASHBOARD PAGE (WITH 8 INTEGRATED ANALYTICS) ---
    function DashboardPage({ user, orders, setOrders, logAuditAction, onNavigate }) {
      const { isViewer, guard } = useERPPermissions(user);
      const [selectedOrder, setSelectedOrder] = useState(null);

      const sumTotalValue = orders.reduce((sum, o) => sum + o.payment.totalAmount, 0);
      const activeCount = orders.filter(o => o.status !== "ปิดงาน" && o.status !== "จัดส่งแล้ว").length;
      const closedCount = orders.filter(o => o.status === "ปิดงาน").length;
      const delayedCount = orders.filter(o => o.payment.isOverdue).length;

      // 8 Analytical Dimensions
      const monthlyOrders = Array(12).fill(0);
      const monthlyValues = Array(12).fill(0); // no sample data
      const unpaidCount = orders.filter(o => o.payment.status === "ยังไม่ชำระ").length;
      const partialCount = orders.filter(o => o.payment.status === "ชำระบางส่วน").length;
      const fullyPaidCount = orders.filter(o => o.payment.status === "ชำระครบ").length;
      const assignees = [];
      const workloads = [];
      const onTimeCount = orders.filter(o => !o.payment.isOverdue).length;
      const leatherCount = orders.filter(o => o.items.some(it => it.product.category === "หนัง")).length;
      const productCount = orders.filter(o => o.items.some(it => it.product.category === "ผลิตภัณฑ์")).length;
      const mixedCount = orders.length - leatherCount - productCount;
      const leadTimes = Array(6).fill(0);
      const factoryCounts = [0, 0];

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            {[
              { label: "ออเดอร์ในระบบ", val: `${orders.length} รายการ` },
              { label: "ปิดงานสำเร็จ", val: `${closedCount} รายการ` },
              { label: "อยู่ระหว่างผลิต", val: `${activeCount} รายการ` },
              { label: "มูลค่าสัญญารวม", val: `฿${sumTotalValue.toLocaleString()}` },
              { label: "สัญญาผิดนัดล่าช้า", val: `${delayedCount} รายการ` }
            ].map((kpi, i) => (
              <div key={i} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">{kpi.label}</p>
                <h4 className="text-base font-extrabold text-slate-800 mt-2 leading-none">{kpi.val}</h4>
              </div>
            ))}
          </div>

          <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-150">
            <h4 className="text-xs font-bold text-slate-600 uppercase mb-3">ผังควบคุมกระบวนการผลิต Evergen 12 ขั้นตอน</h4>
            <div className="grid grid-cols-4 md:grid-cols-12 gap-2 text-center text-[10px]">
              {WORKFLOW_STAGES.map((st, i) => {
                const cnt = orders.filter(o => o.status === st).length;
                return (
                  <div key={i} className={`p-2 rounded-lg border ${cnt > 0 ? 'bg-gold/5 border-gold shadow-sm font-bold' : 'bg-slate-50 border-slate-100'}`}>
                    <p className="truncate text-slate-500">{st}</p>
                    <p className="text-brand text-xs mt-1">{cnt} งาน</p>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 8-CHART INTELLIGENCE GRID */}
          <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-150 space-y-4">
            <h4 className="text-xs font-bold text-slate-700 uppercase tracking-wider">กระดานตรวจสอบสารสนเทศสากลและการวิเคราะห์ (8 Analytics Dashboard)</h4>
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              
              <div className="border p-3 rounded-lg flex flex-col justify-between bg-slate-50/50">
                <p className="text-[9px] font-bold text-slate-400 uppercase">1. ออเดอร์รายเดือน (ย้อนหลัง 12 ด.)</p>
                <div className="h-16 flex items-end justify-between pt-2">
                  {monthlyOrders.map((val, idx) => (
                    <div key={idx} className="group relative h-full flex-1 flex items-end justify-center cursor-crosshair">
                      <div className="absolute z-50 bottom-full mb-2 opacity-0 group-hover:opacity-100 bg-slate-900 text-white text-[10px] font-bold px-2 py-1 rounded shadow-xl whitespace-nowrap">เดือน {idx+1}: {val} รายการ</div>
                      <div className="w-2 bg-[#0F284D] rounded-t group-hover:bg-gold transition-colors" style={{ height: `${(val/32)*100}%` }}></div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="border p-3 rounded-lg flex flex-col justify-between bg-slate-50/50">
                <p className="text-[9px] font-bold text-slate-400 uppercase">2. มูลค่าสัญญาสะสมรายเดือน (แสนบาท)</p>
                <div className="h-16 flex items-end justify-between pt-2">
                  {monthlyValues.map((val, idx) => (
                    <div key={idx} className="group relative h-full flex-1 flex items-end justify-center cursor-crosshair">
                      <div className="absolute z-50 bottom-full mb-2 opacity-0 group-hover:opacity-100 bg-slate-900 text-white text-[10px] font-bold px-2 py-1 rounded shadow-xl whitespace-nowrap">เดือน {idx+1}: ฿{(val*10000).toLocaleString()}</div>
                      <div className="w-2 bg-gold rounded-t group-hover:bg-[#0F284D] transition-colors" style={{ height: `${(val/70)*100}%` }}></div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="border p-3 rounded-lg space-y-1 text-[9px] bg-slate-50/50">
                <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">3. สัดส่วนสถานะชำระบิล</p>
                <div className="flex justify-between"><span>ยังไม่ชำระ ({unpaidCount})</span><span className="font-bold">{unpaidCount}</span></div>
                <div className="flex justify-between"><span>ชำระบางส่วน ({partialCount})</span><span className="font-bold">{partialCount}</span></div>
                <div className="flex justify-between"><span>ชำระครบ ({fullyPaidCount})</span><span className="font-bold">{fullyPaidCount}</span></div>
              </div>

              <div className="border p-3 rounded-lg space-y-1 text-[9px] bg-slate-50/50">
                <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">4. ภาระงานรายผู้ควบคุม</p>
                {assignees.map((name, idx) => (
                  <div key={idx} className="flex justify-between"><span>{name}</span><span className="font-bold">{workloads[idx]} งาน</span></div>
                ))}
              </div>

    // --- AUTOMATIC ORDER CODE GENERATION ---
    // Format: EVG-YYYYMMDD-XXXXXX
    // Uses the browser's cryptographically secure random number generator.
    const ORDER_CODE_ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

    function generateSecureRandomOrderSuffix(length = 6) {
      if (!window.crypto || !window.crypto.getRandomValues) {
        throw new Error('เบราว์เซอร์นี้ไม่รองรับการสร้างรหัสแบบปลอดภัย');
      }

      let result = '';

      // 252 is the largest multiple of 36 below 256.
      // Rejecting bytes >= 252 avoids modulo bias.
      while (result.length < length) {
        const bytes = new Uint8Array(Math.max(16, (length - result.length) * 2));
        window.crypto.getRandomValues(bytes);

        for (const byte of bytes) {
          if (byte >= 252) continue;
          result += ORDER_CODE_ALPHABET[byte % ORDER_CODE_ALPHABET.length];
          if (result.length === length) break;
        }
      }

      return result;
    }

    function generateAutomaticOrderCode(existingOrders = []) {
      const now = new Date();
      const yyyy = String(now.getFullYear());
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const datePart = `${yyyy}${mm}${dd}`;
      const existingIds = new Set(existingOrders.map(order => order.id));

      // Retry locally if an existing order already has the generated ID.
      for (let attempt = 0; attempt < 100; attempt += 1) {
        const candidate = `EVG-${datePart}-${generateSecureRandomOrderSuffix(6)}`;
        if (!existingIds.has(candidate)) return candidate;
      }

      throw new Error('ไม่สามารถสร้างรหัสออร์เดอร์ที่ไม่ซ้ำได้ กรุณาลองใหม่');
    }

et.value))}/></td><td className="text-center font-bold">฿{(row.price*row.quantity).toLocaleString()}</td><td><button onClick={()=>removeItem(idx)} className="text-rose-600 font-bold">ลบ</button></td></tr>)}</tbody></table></div></div>}

            {activeTab==='การชำระเงิน' && <div className="grid md:grid-cols-3 gap-4"><Field type="number" label="ยอดรวม" value={draft.payment.totalAmount} onChange={e=>setNested('payment','totalAmount',Number(e.target.value))}/><Field type="number" label="ยอดชำระแล้ว" value={draft.payment.paidAmount} onChange={e=>setNested('payment','paidAmount',Number(e.target.value))}/><Field label="เงื่อนไข" value={draft.payment.terms} onChange={e=>setNested('payment','terms',e.target.value)}/><SelectField label="สถานะการชำระ" value={draft.payment.status} onChange={e=>setNested('payment','status',e.target.value)}><option>ยังไม่ชำระ</option><option>ชำระบางส่วน</option><option>ชำระครบ</option></SelectField><label className="flex items-center gap-2 mt-6"><input type="checkbox" checked={!!draft.payment.isOverdue} onChange={e=>setNested('payment','isOverdue',e.target.checked)}/> เกินกำหนดชำระ</label></div>}

            {activeTab==='สถานะงาน' && <div className="grid md:grid-cols-2 gap-5"><SelectField label="สถานะเวิร์กโฟลว์ปัจจุบัน" value={draft.status} onChange={e=>updateDraft(d=>({...d,status:e.target.value,statusTimeline:[{status:e.target.value,updatedAt:new Date().toLocaleString('th-TH'),updatedBy:user.name},...d.statusTimeline]}))}>{WORKFLOW_STAGES.map(st=><option key={st}>{st}</option>)}</SelectField><Field label="ผู้รับผิดชอบ" value={draft.responsiblePerson||''} onChange={e=>updateDraft(d=>({...d,responsiblePerson:e.target.value}))}/><div className="md:col-span-2 space-y-3 border-l-2 border-gold/30 pl-4">{draft.statusTimeline.map((tl,idx)=><div key={idx}><p className="font-bold">{tl.status}</p><p className="text-[10px] text-slate-400">{tl.updatedAt} · {tl.updatedBy}</p></div>)}</div></div>}

    // --- PAGE 6: CUSTOMERS DIRECTORY PAGE ---
    function CustomersPage({ user, customers, setCustomers, orders, logAuditAction }) {
      const { guard } = useERPPermissions(user); const [search,setSearch]=useState(''); const [edit,setEdit]=useState(null);
      const blank={id:'',company:'',name:'',phone:'',email:'',taxId:'',address:'',status:'Active'};
      const filtered=customers.filter(c=>`${c.company} ${c.name} ${c.email} ${c.phone}`.toLowerCase().includes(search.toLowerCase()));
      const save=()=>guard(()=>{ const exists=customers.some(c=>c.id===edit.id); const record={...edit,id:edit.id||`CUST-${String(customers.length+1).padStart(2,'0')}`}; setCustomers(prev=>exists?prev.map(c=>c.id===record.id?record:c):[record,...prev]); logAuditAction(exists?'edit':'add', record.company, 'customer'); setEdit(null); });
      const remove=id=>guard(()=>{if(confirm('ต้องการลบลูกค้านี้ใช่หรือไม่?')){setCustomers(prev=>prev.filter(c=>c.id!==id));logAuditAction('remove', id, 'customer')}});
      return <div className="space-y-5 text-xs animate-fadeIn"><div className="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center"><div><h4 className="font-black">ทะเบียนลูกค้า (Master Customers)</h4><p className="text-[10px] text-slate-400 mt-1">คลิกการ์ดเพื่อแก้ไขข้อมูลลูกค้า</p></div><button onClick={()=>setEdit({...blank})} className="bg-brand text-white px-4 py-2 rounded-lg font-bold">+ ลูกค้าใหม่</button></div><div className="bg-white p-4 rounded-xl border"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหาชื่อบริษัท ผู้ติดต่อ อีเมล หรือเบอร์โทร..." className="w-full md:w-96 p-2.5 border rounded-lg"/></div><div className="grid md:grid-cols-3 gap-4">{filtered.map(c=>{const custOrders=(orders||[]).filter(o=>o.customer.id===c.id);const total=custOrders.reduce((a,o)=>a+o.payment.totalAmount,0);return <div key={c.id} onClick={()=>setEdit({...c})} className="erp-card bg-white p-4 rounded-xl border shadow-sm cursor-pointer"><div><h5 className="font-extrabold text-sm text-brand">{c.company}</h5><p className="mt-1">{c.name}</p></div><div className="text-slate-500 mt-3 space-y-1"><p>☎ {c.phone}</p><p>✉ {c.email}</p></div><div className="grid grid-cols-3 gap-2 mt-4 pt-3 border-t text-center"><div><p className="font-bold">{custOrders.length}</p><p className="text-[9px] text-slate-400">ออเดอร์</p></div><div><p className="font-bold">฿{total.toLocaleString()}</p><p className="text-[9px] text-slate-400">ยอดรวม</p></div><button onClick={e=>{e.stopPropagation();remove(c.id)}} className="text-rose-600 font-bold">ลบ</button></div></div>})}</div>{edit&&<Modal title={edit.id?'แก้ไขลูกค้า':'เพิ่มลูกค้า'} onClose={()=>setEdit(null)} footer={<><button onClick={()=>setEdit(null)} className="px-4 py-2 border rounded-lg font-bold">ยกเลิก</button><button onClick={save} className="px-4 py-2 bg-brand text-white rounded-lg font-bold">บันทึก</button></>}><div className="grid md:grid-cols-2 gap-4"><Field label="ชื่อบริษัท" value={edit.company} onChange={e=>setEdit({...edit,company:e.target.value})}/><Field label="ผู้ติดต่อ" value={edit.name} onChange={e=>setEdit({...edit,name:e.target.value})}/><Field label="โทรศัพท์" value={edit.phone} onChange={e=>setEdit({...edit,phone:e.target.value})}/><Field label="อีเมล" value={edit.email} onChange={e=>setEdit({...edit,email:e.target.value})}/><Field label="เลขผู้เสียภาษี" value={edit.taxId} onChange={e=>setEdit({...edit,taxId:e.target.value})}/><label className="md:col-span-2"><span className="block text-[10px] font-bold text-slate-500 mb-1.5">ที่อยู่</span><textarea value={edit.address} onChange={e=>setEdit({...edit,address:e.target.value})} className="w-full p-2.5 border rounded-lg" rows="3"/></label></div></Modal>}</div>;
    }

    function ProductsPage({ user, products, setProducts, logAuditAction }) {
      const { guard } = useERPPermissions(user);
      const [search, setSearch] = useState('');
      const [edit, setEdit] = useState(null);

      const PRODUCT_TYPES = ['คลาสสิก', 'นูบัค', 'โบทานิกา', 'ลักซ์'];
      const PATTERNS = ['ลายเม็ด', 'ปราด้า', 'เอปซอม', 'ลายไม้', 'อื่น ๆ'];
      const COLORS = ['แดง', 'ส้ม', 'เหลือง', 'เขียว', 'น้ำเงิน', 'กรมท่า', 'ม่วง', 'ชมพู', 'ขาว', 'ดำ', 'เทา', 'ครีม', 'น้ำตาล'];
      const GLOSS_OPTIONS = ['เงาพื้นฐาน', 'ด้าน'];
      const THICKNESS_OPTIONS = ['0.6', '0.8', '1.0', '1.2', '1.6', '2.0'];
      const SIZE_OPTIONS = ['60×100', '100×120'];

      const blank = {
        id: '',
        name: '',
        category: 'หนัง',
        type: '',
        pattern: '',
        customPattern: '',
        pantone: '',
        colorFamily: '',
        gloss: '',
        thickness: '',
        size: '',
        stock: 0,
        spec: '',
        price: 0,
        unit: 'ใบ',
        emboss: '',
        finish: ''
      };

      const prepareProductForEdit = (product = {}) => ({
        ...blank,
        ...product,
        type: product.type || (PRODUCT_TYPES.includes(product.category) ? product.category : ''),
        pattern: PATTERNS.includes(product.pattern || product.emboss || '') ? (product.pattern || product.emboss || '') : ((product.pattern || product.emboss) ? 'อื่น ๆ' : ''),
        customPattern: PATTERNS.includes(product.pattern || product.emboss || '') ? '' : (product.customPattern || product.pattern || product.emboss || ''),
        colorFamily: product.colorFamily || product.color || '',
        gloss: product.gloss || product.finish || '',
        size: product.size || ''
      });

      const filtered = products.filter(p =>
        `${p.id} ${p.name} ${p.pantone} ${p.type || ''} ${p.pattern || p.emboss || ''} ${p.colorFamily || p.color || ''}`
          .toLowerCase()
          .includes(search.toLowerCase())
      );

      const save = () => guard(() => {
        const exists = products.some(p => p.id === edit.id);
        const finalPattern = edit.pattern === 'อื่น ๆ' ? edit.customPattern.trim() : edit.pattern;
        const generatedName = [edit.type, finalPattern, edit.pantone].filter(Boolean).join(' · ') || 'สินค้าใหม่';
        const rec = {
          ...edit,
          id: edit.id || `PROD-${String(products.length + 1).padStart(2, '0')}`,
          name: generatedName,
          category: 'หนัง',
          price: Number(edit.price || 0),
          stock: Number(edit.stock || 0),

          emboss: finalPattern,
          finish: edit.gloss,

        };

        setProducts(prev => exists
          ? prev.map(p => p.id === rec.id ? rec : p)

        );

      });

                <td className="p-3">

        >
          <div className="grid md:grid-cols-4 gap-x-6 gap-y-5">

              <option value="">เลือก...</option>
              {PRODUCT_TYPES.map(option => <option key={option} value={option}>{option}</option>)}
            </SelectField>

            <div>
              <SelectField label="ลวดลาย" value={edit.pattern} onChange={e => setEdit({...edit, pattern: e.target.value, customPattern: e.target.value === 'อื่น ๆ' ? edit.customPattern : ''})}>

              )}
            </div>

            <Field
              label="รหัส Pantone"
              value={edit.pantone}
              placeholder="เช่น Black 6 C"

            <SelectField label="สี" value={edit.colorFamily} onChange={e => setEdit({...edit, colorFamily: e.target.value})}>
              <option value="">เลือก...</option>
              {COLORS.map(option => <option key={option} value={option}>{option}</option>)}

            <SelectField label="ความเงา" value={edit.gloss} onChange={e => setEdit({...edit, gloss: e.target.value})}>
              <option value="">เลือก...</option>

            </SelectField>

            <SelectField label="ความหนา (มม.)" value={edit.thickness} onChange={e => setEdit({...edit, thickness: e.target.value})}>
              <option value="">เลือก...</option>
              {THICKNESS_OPTIONS.map(option => <option key={option} value={option}>{option}</option>)}
            </SelectField>

            <SelectField label="ขนาด (ซม.)" value={edit.size} onChange={e => setEdit({...edit, size: e.target.value})}>
              <option value="">เลือก...</option>
              {SIZE_OPTIONS.map(option => <option key={option} value={option}>{option}</option>)}
            </SelectField>

            <Field
              label="จำนวนคงคลัง"

            <Field

              value={edit.spec}

    function DocumentsPage({ user, documents, setDocuments, logAuditAction }) {
      const { guard }=useERPPermissions(user); const [search,setSearch]=useState(''); const [edit,setEdit]=useState(null);
      const upload=()=>guard(()=>{const d={id:`DOC-${100+documents.length+1}`,name:`เอกสารใหม่_${documents.length+1}.pdf`,category:'เอกสารอื่น',size:'1.00 MB',uploadedAt:new Date().toLocaleString('th-TH'),uploadedBy:user.name};setDocuments(prev=>[d,...prev]);logAuditAction('add', d.name, 'document')});
      const save=()=>guard(()=>{setDocuments(prev=>prev.map(d=>d.id===edit.id?edit:d));logAuditAction('edit', edit.name, 'document');setEdit(null)});
      const remove=id=>guard(()=>{if(confirm('ลบเอกสารนี้ใช่หรือไม่?')){setDocuments(prev=>prev.filter(d=>d.id!==id));logAuditAction('remove',id,'document')}});
      const filtered=documents.filter(d=>`${d.name} ${d.category} ${d.uploadedBy}`.toLowerCase().includes(search.toLowerCase()));
      return <div className="space-y-5 text-xs"><div className="bg-white p-4 rounded-xl border shadow-sm flex justify-between"><div><h4 className="font-black">คลังเอกสาร</h4><p className="text-[10px] text-slate-400 mt-1">ค้นหา เปลี่ยนชื่อ จัดหมวดหมู่ และลบเอกสารได้</p></div><button onClick={upload} className="bg-brand text-white px-4 py-2 rounded-lg font-bold">📁 อัปโหลดเอกสาร</button></div><div className="bg-white p-4 rounded-xl border"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหาชื่อไฟล์ หมวดหมู่ หรือผู้อัปโหลด..." className="w-full md:w-96 p-2.5 border rounded-lg"/></div><div className="grid md:grid-cols-3 gap-4">{filtered.map(doc=><div key={doc.id} className="erp-card bg-white p-4 rounded-xl border shadow-sm"><div className="flex gap-3"><span className="text-2xl">📄</span><div className="min-w-0"><p className="font-bold truncate">{doc.name}</p><p className="text-[9px] text-slate-400">{doc.category} · {doc.size}</p></div></div><div className="mt-4 pt-3 border-t flex gap-3"><button className="text-brand font-bold">ดู</button><button className="text-brand font-bold">ดาวน์โหลด</button><button onClick={()=>setEdit({...doc})} className="text-brand font-bold">แก้ไข</button><button onClick={()=>remove(doc.id)} className="text-rose-600 font-bold ml-auto">ลบ</button></div></div>)}</div>{edit&&<Modal title="แก้ไขข้อมูลเอกสาร" onClose={()=>setEdit(null)} footer={<button onClick={save} className="bg-brand text-white px-4 py-2 rounded-lg font-bold">บันทึก</button>}><div className="space-y-4"><Field label="ชื่อไฟล์" value={edit.name} onChange={e=>setEdit({...edit,name:e.target.value})}/><Field label="หมวดหมู่" value={edit.category} onChange={e=>setEdit({...edit,category:e.target.value})}/></div></Modal>}</div>;
    }

    function HoverBarChart({ data, valuePrefix = "", valueSuffix = "", height = 300 }) {
      const [tip, setTip] = useState(null);
      const max = Math.max(...data.map(d => d.value), 1);
      const showTip = (e,d) => setTip({x:e.clientX,y:e.clientY,label:d.label,value:d.value});
      return <div className="relative overflow-visible">
        {tip && <div className="chart-tooltip" style={{left:tip.x,top:tip.y}}><p className="text-[10px] text-slate-300 font-semibold">{tip.label}</p><p className="text-sm text-[#E5B84A] font-black mt-0.5">{valuePrefix}{tip.value.toLocaleString()}{valueSuffix}</p></div>}
        <div className="relative flex items-end gap-3 border-l border-b border-slate-300 px-4 pt-10 pb-8 bg-gradient-to-b from-[#EAF0F6] to-[#F9FBFD] rounded-xl overflow-visible" style={{height}}>
          {[25,50,75,100].map(t=><div key={t} className="absolute left-0 right-0 border-t border-dashed border-slate-300/80" style={{bottom:`calc(32px + ${(height-76)*t/100}px)`}}><span className="absolute -left-2 -translate-x-full -top-2 text-[9px] text-slate-500 font-semibold">{Math.round(max*t/100).toLocaleString()}</span></div>)}
          {data.map(d=><div key={d.label} className="flex-1 h-full flex flex-col justify-end items-center relative group cursor-crosshair" onMouseEnter={e=>showTip(e,d)} onMouseMove={e=>showTip(e,d)} onMouseLeave={()=>setTip(null)}>
            <div className="absolute text-[9px] font-extrabold text-brand transition-all group-hover:text-gold group-hover:scale-110" style={{bottom:`calc(${Math.max((d.value/max)*100,4)}% + 7px)`}}>{valuePrefix}{d.value.toLocaleString()}{valueSuffix}</div>
            <div className="w-full max-w-[46px] bg-gradient-to-t from-[#0A2442] to-[#285C91] rounded-t-lg shadow-md group-hover:from-[#B47C0C] group-hover:to-[#E5B84A] transition-all duration-150 ring-1 ring-white/30" style={{height:`${Math.max((d.value/max)*100,4)}%`}}></div>
            <span className="absolute -bottom-6 text-[10px] text-slate-600 font-bold whitespace-nowrap">{d.label}</span>
          </div>)}
        </div>
      </div>;
    }

    function ReportsPage({ orders }) {
      const total=orders.reduce((a,o)=>a+o.payment.totalAmount,0), paid=orders.reduce((a,o)=>a+o.payment.paidAmount,0);
      const monthLabels=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      const now = new Date();
      const monthly = Array.from({ length: 12 }, (_, offset) => {
        const d = new Date(now.getFullYear(), now.getMonth() - 11 + offset, 1);
        const year = d.getFullYear();
        const month = d.getMonth();

        const value = orders.reduce((sum, order) => {
          let createdDate = null;

          if (order.createdAtISO) {
            const parsed = new Date(order.createdAtISO);
            if (!Number.isNaN(parsed.getTime())) createdDate = parsed;
          }

          // Backward-compatible fallback for manually/imported records that use ISO-style dates.
          if (!createdDate && order.createdAt) {
            const parsed = new Date(order.createdAt);
            if (!Number.isNaN(parsed.getTime())) createdDate = parsed;
          }

          if (!createdDate || createdDate.getFullYear() !== year || createdDate.getMonth() !== month) {
            return sum;
          }

          return sum + Number(order.payment?.totalAmount || 0);
        }, 0);

        return {
          label: `${monthLabels[month]} ${String(year + 543).slice(-2)}`,
          value
        };
      });
      const hasMonthlyData = monthly.some(item => item.value > 0);
      const paymentData=['ชำระครบ','ชำระบางส่วน','ยังไม่ชำระ'].map(label=>({label,value:orders.filter(o=>o.payment.status===label).length}));
      return <div className="space-y-6 text-xs animate-fadeIn">
        <div className="flex flex-col md:flex-row md:items-end justify-between gap-4"><div><p className="text-[10px] uppercase tracking-[.2em] text-gold font-extrabold">Performance intelligence</p><h3 className="text-2xl font-extrabold text-brand mt-1">รายงานและการวิเคราะห์</h3><p className="text-slate-500 mt-1">วิเคราะห์ยอดขาย การรับชำระ และสถานะงานด้วยกราฟแบบโต้ตอบ</p></div><div className="flex gap-2"><button className="border bg-white px-4 py-2.5 rounded-lg font-bold hover:border-gold">Export Excel</button><button className="bg-brand text-white px-4 py-2.5 rounded-lg font-bold shadow-lg hover:bg-[#071932]">Export PDF</button></div></div>
        <div className="grid sm:grid-cols-2 xl:grid-cols-4 gap-4">{[['ยอดสัญญารวม',total,'มูลค่ารวมของทุกออเดอร์'],['รับชำระแล้ว',paid,'เงินที่รับเข้าระบบแล้ว'],['ยอดคงค้าง',total-paid,'ยอดที่ยังต้องติดตาม'],['จำนวนออเดอร์',orders.length,'ออเดอร์ทั้งหมดในระบบ']].map(([l,v,sub],i)=><div className="erp-card bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden" key={l}><div className="absolute top-0 left-0 right-0 h-1 bg-gold"></div><p className="text-slate-500 font-bold">{l}</p><p className="text-2xl font-black text-brand mt-3">{i<3?'฿':''}{v.toLocaleString()}</p><p className="text-[10px] text-slate-400 mt-2">{sub}</p></div>)}</div>
        <div className="grid xl:grid-cols-3 gap-5">
          <div className="xl:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm"><div className="flex items-start justify-between mb-4"><div><h4 className="text-sm font-extrabold text-brand">มูลค่าออเดอร์รายเดือน</h4><p className="text-[10px] text-slate-400 mt-1">{hasMonthlyData?'คำนวณอัตโนมัติจากวันที่สร้างและยอดรวมของออเดอร์จริง':'กราฟจะแสดงอัตโนมัติเมื่อมีการสร้างออเดอร์และบันทึกยอดรวม'}</p></div><div className="border bg-slate-50 rounded-lg px-3 py-2 font-bold text-slate-600">12 เดือนล่าสุด</div></div>{hasMonthlyData?<HoverBarChart data={monthly} valuePrefix="฿" />:<div className="h-[300px] rounded-xl border border-dashed border-slate-300 bg-slate-50 flex flex-col items-center justify-center text-center px-6"><div className="text-3xl mb-3">▥</div><p className="font-extrabold text-brand">ยังไม่มีข้อมูลสำหรับสร้างกราฟ</p><p className="text-[10px] text-slate-400 mt-1">เพิ่มออเดอร์จริงก่อน ระบบจะรวมมูลค่าแยกตามเดือนให้อัตโนมัติ</p></div>}</div>
          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm"><h4 className="text-sm font-extrabold text-brand">สถานะการชำระเงิน</h4><p className="text-[10px] text-slate-400 mt-1 mb-6">จำนวนและสัดส่วนออเดอร์ตามสถานะ</p><div className="space-y-6">{paymentData.map((x,i)=>{const pct=orders.length?x.value/orders.length*100:0;return <div key={x.label}><div className="flex justify-between items-end"><div><p className="font-bold text-slate-700">{x.label}</p><p className="text-[10px] text-slate-400">{pct.toFixed(1)}% ของออเดอร์</p></div><b className="text-lg text-brand">{x.value}</b></div><div className="h-3 bg-slate-100 rounded-full mt-2 overflow-hidden"><div className="h-full bg-gradient-to-r from-gold to-amber-300 rounded-full transition-all" style={{width:`${pct}%`}}></div></div></div>})}</div></div>
        </div>
      </div>;
    }

    function PaymentsPage({ user, payments, setPayments, logAuditAction }) { const {guard}=useERPPermissions(user); const [edit,setEdit]=useState(null); const save=()=>guard(()=>{const rec={...edit,amount:Number(edit.amount),paidAmount:Number(edit.paidAmount),status:Number(edit.paidAmount)>=Number(edit.amount)?'ชำระครบ':Number(edit.paidAmount)>0?'ชำระบางส่วน':'ยังไม่ชำระ'};setPayments(prev=>prev.map(p=>p.id===rec.id?rec:p));logAuditAction('แก้ไขการชำระเงิน',rec.id);setEdit(null)}); const remove=id=>guard(()=>{if(confirm('ลบรายการชำระเงินนี้ใช่หรือไม่?'))setPayments(prev=>prev.filter(p=>p.id!==id))}); return <div className="space-y-5 text-xs"><div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-left">รหัส</th><th>ออเดอร์</th><th>ยอดรวม</th><th>รับแล้ว</th><th>คงเหลือ</th><th>สถานะ</th><th className="p-3 text-right">ดำเนินการ</th></tr></thead><tbody>{payments.map(p=><tr key={p.id} className="border-t erp-row"><td className="p-3 font-black text-brand">{p.id}</td><td className="text-center">{p.orderId}</td><td className="text-center font-bold">฿{p.amount.toLocaleString()}</td><td className="text-center text-emerald-700 font-bold">฿{p.paidAmount.toLocaleString()}</td><td className="text-center text-rose-600 font-bold">฿{(p.amount-p.paidAmount).toLocaleString()}</td><td className="text-center"><StatusBadge tone={p.status==='ชำระครบ'?'green':p.status==='ชำระบางส่วน'?'gold':'red'}>{p.status}</StatusBadge></td><td className="p-3"><div className="flex justify-end gap-2"><button onClick={()=>setEdit({...p})} className="border px-2 py-1 rounded-lg font-bold">แก้ไข</button>{p.status!=='ชำระครบ'&&<button onClick={()=>guard(()=>setPayments(prev=>prev.map(x=>x.id===p.id?{...x,paidAmount:x.amount,status:'ชำระครบ'}:x)))} className="bg-emerald-600 text-white px-2 py-1 rounded-lg font-bold">รับครบ</button>}<button onClick={()=>remove(p.id)} className="text-rose-600 font-bold">ลบ</button></div></td></tr>)}</tbody></table></div>{edit&&<Modal title={`แก้ไข ${edit.id}`} onClose={()=>setEdit(null)} footer={<button onClick={save} className="bg-brand text-white px-4 py-2 rounded-lg font-bold">บันทึก</button>}><div className="grid grid-cols-2 gap-4"><Field type="number" label="ยอดรวม" value={edit.amount} onChange={e=>setEdit({...edit,amount:e.target.value})}/><Field type="number" label="ยอดรับแล้ว" value={edit.paidAmount} onChange={e=>setEdit({...edit,paidAmount:e.target.value})}/><Field type="date" label="วันครบกำหนด" value={edit.dueDate} onChange={e=>setEdit({...edit,dueDate:e.target.value})}/></div></Modal>}</div>; }

    function ProductionPage({ user, production, setProduction, logAuditAction }) {
      const {guard}=useERPPermissions(user); const [edit,setEdit]=useState(null); const stages=['รับออเดอร์','ผลิตหนัง','QC หนัง','ผลิตผลิตภัณฑ์','QC ผลิตภัณฑ์','พร้อมจัดส่ง'];
      const move=(id,stage)=>guard(()=>{setProduction(prev=>prev.map(p=>p.id===id?{...p,stage}:p));logAuditAction('edit',`${id} → ${stage}`,'production')});
      const save=()=>guard(()=>{const exists=production.some(p=>p.id===edit.id);const rec={...edit,id:edit.id||`PROD-REC-${Date.now()}`,progress:Number(edit.progress)};setProduction(prev=>exists?prev.map(p=>p.id===rec.id?rec:p):[rec,...prev]);logAuditAction(exists?'edit':'add',rec.orderId,'production');setEdit(null)});
      const remove=id=>guard(()=>{if(confirm('ลบรายการผลิตนี้ใช่หรือไม่?')){setProduction(prev=>prev.filter(p=>p.id!==id));logAuditAction('remove',id,'production')}});
      const add=()=>setEdit({id:'',orderId:'EVG-NEW',factory:'โรงงานฟอกย้อมนนทบุรี',stage:'รับออเดอร์',assignedTo:user.name,qcPassed:true,defectCount:0,defectNote:'',progress:0});
      return <div className="space-y-4 text-xs"><div className="flex justify-between items-center"><div><h3 className="text-lg font-extrabold text-brand">กระดานการผลิต</h3><p className="text-slate-400">เพิ่ม แก้ไข ย้ายขั้นตอน หรือลบงานผลิตได้</p></div><button onClick={add} className="bg-brand text-white px-4 py-2 rounded-lg font-bold">+ เพิ่มงานผลิต</button></div><div className="overflow-x-auto"><div className="flex gap-4 min-w-[1180px]">{stages.map((st,i)=>{const cards=production.filter(p=>p.stage===st);return <div key={st} className="flex-1 bg-slate-50 border rounded-xl p-3 min-h-[460px]"><div className="flex justify-between border-b pb-2"><b>{st}</b><StatusBadge tone="gray">{cards.length}</StatusBadge></div><div className="space-y-3 mt-3">{cards.map(card=><div key={card.id} className="erp-card bg-white p-3 rounded-xl border shadow-sm"><div className="flex justify-between"><b className="text-brand">{card.orderId}</b><div className="flex gap-2"><button onClick={()=>setEdit({...card})}>✎</button><button onClick={()=>remove(card.id)} className="text-rose-600">×</button></div></div><p className="text-slate-500 mt-2">ผู้รับผิดชอบ: {card.assignedTo}</p><div className="mt-3"><div className="flex justify-between text-[9px]"><span>ความคืบหน้า</span><b>{card.progress}%</b></div><div className="h-2 bg-slate-100 rounded mt-1"><div className="h-full bg-emerald-600 rounded" style={{width:`${Math.min(card.progress,100)}%`}}></div></div></div><div className="flex justify-between mt-3 pt-2 border-t">{i>0?<button onClick={()=>move(card.id,stages[i-1])} className="border px-2 rounded">←</button>:<span/>}{i<stages.length-1&&<button onClick={()=>move(card.id,stages[i+1])} className="border px-2 rounded">→</button>}</div></div>)}</div></div>})}</div></div>{edit&&<Modal title={edit.id?'แก้ไขงานผลิต':'เพิ่มงานผลิต'} onClose={()=>setEdit(null)} footer={<button onClick={save} className="bg-brand text-white px-4 py-2 rounded-lg font-bold">บันทึก</button>}><div className="space-y-4"><Field label="รหัสออเดอร์" value={edit.orderId} onChange={e=>setEdit({...edit,orderId:e.target.value})}/><Field label="โรงงาน" value={edit.factory} onChange={e=>setEdit({...edit,factory:e.target.value})}/><Field label="ผู้รับผิดชอบ" value={edit.assignedTo} onChange={e=>setEdit({...edit,assignedTo:e.target.value})}/><Field type="number" min="0" max="100" label="ความคืบหน้า (%)" value={edit.progress} onChange={e=>setEdit({...edit,progress:e.target.value})}/><SelectField label="ขั้นตอน" value={edit.stage} onChange={e=>setEdit({...edit,stage:e.target.value})}>{stages.map(s=><option key={s}>{s}</option>)}</SelectField></div></Modal>}</div>;
    }

    function ShippingPage({ user, shipments, setShipments, logAuditAction }) { const {guard}=useERPPermissions(user); const [edit,setEdit]=useState(null); const save=()=>guard(()=>{setShipments(prev=>prev.map(s=>s.id===edit.id?edit:s));logAuditAction('แก้ไขการจัดส่ง',edit.id);setEdit(null)});const remove=id=>guard(()=>{if(confirm('ลบรายการจัดส่งนี้ใช่หรือไม่?'))setShipments(prev=>prev.filter(s=>s.id!==id))});return <div className="space-y-5 text-xs"><div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-left">รหัส</th><th>ออเดอร์</th><th>ผู้ขนส่ง</th><th>Tracking No.</th><th>กำหนดส่ง</th><th>สถานะ</th><th className="p-3 text-right">ดำเนินการ</th></tr></thead><tbody>{shipments.map(s=><tr key={s.id} className="border-t erp-row"><td className="p-3 font-black text-brand">{s.id}</td><td className="text-center">{s.orderId}</td><td className="text-center">{s.carrier}</td><td className="text-center font-bold text-brand"><button title="คัดลอกเลขติดตาม" onClick={()=>navigator.clipboard?.writeText(s.trackingNo)}>{s.trackingNo}</button></td><td className="text-center">{s.estimatedDelivery}</td><td className="text-center"><StatusBadge tone={s.status==='จัดส่งสำเร็จ'?'green':s.status==='ระหว่างขนส่ง'?'gold':'gray'}>{s.status}</StatusBadge></td><td className="p-3"><div className="flex justify-end gap-2"><button onClick={()=>setEdit({...s})} className="border px-2 py-1 rounded-lg font-bold">แก้ไข</button>{s.status!=='จัดส่งสำเร็จ'&&<button onClick={()=>guard(()=>setShipments(prev=>prev.map(x=>x.id===s.id?{...x,status:'จัดส่งสำเร็จ'}:x)))} className="bg-emerald-600 text-white px-2 py-1 rounded-lg font-bold">ส่งสำเร็จ</button>}<button onClick={()=>remove(s.id)} className="text-rose-600 font-bold">ลบ</button></div></td></tr>)}</tbody></table></div>{edit&&<Modal title={`แก้ไข ${edit.id}`} onClose={()=>setEdit(null)} footer={<button onClick={save} className="bg-brand text-white px-4 py-2 rounded-lg font-bold">บันทึก</button>}><div className="grid grid-cols-2 gap-4"><Field label="ผู้ขนส่ง" value={edit.carrier} onChange={e=>setEdit({...edit,carrier:e.target.value})}/><Field label="Tracking No." value={edit.trackingNo} onChange={e=>setEdit({...edit,trackingNo:e.target.value})}/><Field type="date" label="กำหนดส่ง" value={edit.estimatedDelivery} onChange={e=>setEdit({...edit,estimatedDelivery:e.target.value})}/><SelectField label="สถานะ" value={edit.status} onChange={e=>setEdit({...edit,status:e.target.value})}><option>รอดำเนินการ</option><option>ระหว่างขนส่ง</option><option>จัดส่งสำเร็จ</option><option>ส่งคืนคลัง</option></SelectField></div></Modal>}</div>; }



    // --- PAGE 13: SETTINGS PAGE ---
    function SettingsPage({ user, settings, setSettings, logAuditAction }) {
      const { isViewer, guard } = useERPPermissions(user);
      const [compName, setCompName] = useState(settings.companyName);

      const handleSave = (e) => {
        e.preventDefault();
        guard(() => {
          setSettings({ ...settings, companyName: compName });
          logAuditAction("ปรับแต่งค่าระบบ", "แก้ไขพารามิเตอร์รหัสคำนำหน้าเอกสารและนามจดทะเบียนบริษัท");
          alert("บันทึกค่าพารามิเตอร์สำเร็จ");
        });
      };

      return (
        <div className="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md border border-slate-150 font-sarabun text-xs">
          <form onSubmit={handleSave} className="space-y-4">
            <div>
              <label className="block text-[10px] font-bold text-slate-400 mb-1">ชื่อจดทะเบียนสัญญานามบริษัท</label>
              <input type="text" className="w-full p-2.5 border rounded-lg font-bold" value={compName} onChange={(e) => setCompName(e.target.value)} />
            </div>
            <button type="submit" className="bg-brand text-white font-bold py-2.5 px-6 rounded-lg text-xs">บันทึกการปรับแต่งค่า</button>
          </form>
        </div>
      );
    }


    // --- PAGE 14: USERS CONFIGURATION PAGE ---
    function UsersPage({ users }) {
      const visibleUsers = INITIAL_USERS;
      return (
        <div className="space-y-6 text-xs animate-fadeIn">
          <div className="bg-white rounded-xl shadow-md border border-slate-150 overflow-hidden">
            <table className="w-full text-left border-collapse font-medium">
              <thead>
                <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase tracking-wider">
                  <th className="p-3">รหัสพนักงาน</th><th className="p-3">ชื่อ-นามสกุลพนักงาน</th><th className="p-3">อีเมลที่ลงทะเบียน</th><th className="p-3">ประเภทบัญชี</th><th className="p-3 text-center">สถานะ</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {visibleUsers.map((u, idx) => (
                  <tr key={idx} className="hover:bg-slate-50/50">
                    <td className="p-3 font-extrabold text-brand">{u.id}</td><td className="p-3 font-bold text-slate-700">{u.name}</td><td className="p-3 text-slate-500">{u.email}</td><td className="p-3 font-bold text-amber-800">{u.role}</td><td className="p-3 text-center">{u.status}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }


    // --- PAGE 15: AUDIT HISTORY TRAILS LOGS ---
    function AuditLogPage({ auditLogs }) {
      const filtered = auditLogs.filter(log => ['customer','product','document','production'].includes(log.entity) && ['add','edit','remove'].includes(log.operation));
      const tone = op => op==='add'?'green':op==='remove'?'red':'gold';
      return <div className="space-y-5 text-xs animate-fadeIn"><div><h3 className="text-lg font-extrabold text-brand">ประวัติการแก้ไขข้อมูลหลัก</h3><p className="text-slate-400 mt-1">แสดงเฉพาะการเพิ่ม แก้ไข และลบ ลูกค้า สินค้า เอกสาร และงานผลิต</p></div><div className="bg-white rounded-xl shadow-sm border overflow-hidden"><table className="w-full text-left"><thead><tr className="bg-slate-50 border-b text-slate-500"><th className="p-3">วันและเวลา</th><th className="p-3">ผู้ปฏิบัติ</th><th className="p-3">กิจกรรม</th><th className="p-3">รายละเอียด</th></tr></thead><tbody className="divide-y">{filtered.length?filtered.map(log=><tr key={log.id} className="hover:bg-slate-50"><td className="p-3 text-slate-500">{log.timestamp}</td><td className="p-3 font-bold">{log.user}</td><td className="p-3"><StatusBadge tone={tone(log.operation)}>{log.action}</StatusBadge></td><td className="p-3">{log.detail}</td></tr>):<tr><td colSpan="4" className="p-12 text-center text-slate-400">ยังไม่มีประวัติการเพิ่ม แก้ไข หรือลบข้อมูลในหมวดที่กำหนด</td></tr>}</tbody></table></div></div>;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
